<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 160" width="156" height="160">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFD1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cylinderTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFD1;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="cylinderSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#060B12;stop-opacity:1" />
      <stop offset="30%"  style="stop-color:#1A3040;stop-opacity:1" />
      <stop offset="55%"  style="stop-color:#0F2030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#040810;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="capFace" cx="40%" cy="40%" r="60%">
      <stop offset="0%"   style="stop-color:#1EFFD8;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#0077CC;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="specular" cx="35%" cy="35%" r="50%">
      <stop offset="0%"   style="stop-color:#FFFFFF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="diskLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00FFD1;stop-opacity:0" />
      <stop offset="20%"  style="stop-color:#00FFD1;stop-opacity:0.6" />
      <stop offset="80%"  style="stop-color:#00AAFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1F2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bgClip">
      <rect width="156" height="160" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bgClip)">
    <!-- Background -->
    <rect width="156" height="160" fill="url(#darkGrad)"/>

    <!-- Subtle grid -->
    <g opacity="0.04">
      <line x1="0" y1="20" x2="156" y2="20" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="156" y2="40" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="60" x2="156" y2="60" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="156" y2="80" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="100" x2="156" y2="100" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="156" y2="120" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="0" y1="140" x2="156" y2="140" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="40" y1="0" x2="40" y2="160" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="80" y1="0" x2="80" y2="160" stroke="#00FFD1" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="160" stroke="#00FFD1" stroke-width="0.5"/>
    </g>

    <!-- Diagonal connection lines (behind cylinder) -->
    <line x1="78" y1="63" x2="44" y2="38" stroke="#00FFD1" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
    <line x1="78" y1="63" x2="112" y2="38" stroke="#00AAFF" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
    <line x1="78" y1="100" x2="44" y2="122" stroke="#00FFD1" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
    <line x1="78" y1="100" x2="112" y2="122" stroke="#00AAFF" stroke-width="1" opacity="0.4" filter="url(#glow)"/>

    <!-- Cylinder body -->
    <rect x="57" y="63" width="42" height="37" fill="url(#cylinderSide)"/>

    <!-- Disk separator 1 -->
    <ellipse cx="78" cy="76" rx="21" ry="6.5" fill="url(#cylinderSide)"/>
    <ellipse cx="78" cy="76" rx="21" ry="6.5" fill="none" stroke="url(#diskLine)" stroke-width="1"/>

    <!-- Disk separator 2 -->
    <ellipse cx="78" cy="88" rx="21" ry="6.5" fill="url(#cylinderSide)"/>
    <ellipse cx="78" cy="88" rx="21" ry="6.5" fill="none" stroke="url(#diskLine)" stroke-width="1"/>

    <!-- Bottom cap -->
    <ellipse cx="78" cy="100" rx="21" ry="6.5" fill="#08111C" stroke="url(#cyanGrad)" stroke-width="1.5"/>

    <!-- Cylinder edge strokes -->
    <line x1="57" y1="63" x2="57" y2="100" stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="99" y1="63" x2="99" y2="100" stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.7"/>

    <!-- Top cap -->
    <ellipse cx="78" cy="63" rx="21" ry="6.5" fill="#0D1E2E" stroke="url(#cyanGrad)" stroke-width="1.5" filter="url(#glow)"/>
    <ellipse cx="78" cy="63" rx="21" ry="6.5" fill="url(#capFace)"/>
    <ellipse cx="72" cy="61" rx="8" ry="2.5" fill="url(#specular)"/>

    <!-- Horizontal connector lines -->
    <line x1="57" y1="81" x2="28" y2="81" stroke="#00FFD1" stroke-width="1" opacity="0.5"/>
    <line x1="99" y1="81" x2="128" y2="81" stroke="#00AAFF" stroke-width="1" opacity="0.5"/>

    <!-- Agent nodes -->
    <circle cx="44" cy="38"  r="5" fill="#0A1520" stroke="#00FFD1" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="112" cy="38" r="5" fill="#0A1520" stroke="#00AAFF" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="28"  cy="81" r="5" fill="#0A1520" stroke="#00FFD1" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="128" cy="81" r="5" fill="#0A1520" stroke="#00AAFF" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="44" cy="122" r="5" fill="#0A1520" stroke="#00FFD1" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="112" cy="122" r="5" fill="#0A1520" stroke="#00AAFF" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Top cap center dot -->
    <circle cx="78" cy="63" r="2.5" fill="url(#cyanGrad)" filter="url(#glow)"/>
  </g>
</svg>
