name: Build & Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            cc: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            cc: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            cc: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum

      - name: Install cross-compiler
        if: matrix.cc == 'aarch64-linux-gnu-gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build sidecar
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          cd sidecar
          LDFLAGS="-s -w"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags="$LDFLAGS" -o omnibase-sidecar-${{ matrix.suffix }}.exe .
          else
            go build -ldflags="$LDFLAGS" -o omnibase-sidecar-${{ matrix.suffix }} .
          fi

      - name: Create archive
        shell: bash
        run: |
          cd sidecar
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a omnibase-sidecar-${{ matrix.suffix }}.zip omnibase-sidecar-${{ matrix.suffix }}.exe
          else
            tar -czf omnibase-sidecar-${{ matrix.suffix }}.tar.gz omnibase-sidecar-${{ matrix.suffix }}
          fi

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sidecar
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload ${{ github.event.release.tag_name }} \
              omnibase-sidecar-${{ matrix.suffix }}.exe \
              omnibase-sidecar-${{ matrix.suffix }}.zip
          else
            gh release upload ${{ github.event.release.tag_name }} \
              omnibase-sidecar-${{ matrix.suffix }} \
              omnibase-sidecar-${{ matrix.suffix }}.tar.gz
          fi

  build-drivers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            cc: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            cc: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            cc: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && matrix.cc != 'aarch64-linux-gnu-gcc'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Install system dependencies (Linux cross-compile)
        if: matrix.cc == 'aarch64-linux-gnu-gcc'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu unixodbc-dev:arm64

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Build all driver plugins
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          cd sidecar
          LDFLAGS="-s -w"
          mkdir -p build-out

          built=0
          failed=0
          failed_drivers=""
          for d in drivers/*/; do
            name=$(basename "$d")
            [ ! -f "$d/main.go" ] && continue
            binary="driver-${name}-${{ matrix.suffix }}"
            if [ "${{ matrix.goos }}" = "windows" ]; then
              binary="${binary}.exe"
            fi
            printf "  Building %-25s" "$name"
            if go build -ldflags="$LDFLAGS" -o "build-out/$binary" "./$d"; then
              echo "ok"
              built=$((built + 1))
            else
              echo "FAILED"
              failed=$((failed + 1))
              failed_drivers="${failed_drivers} ${name}"
            fi
          done

          echo ""
          echo "Built: $built  Failed: $failed"
          if [ $failed -gt 0 ]; then
            echo "::warning::Failed to build drivers:${failed_drivers}"
          fi

          # Fail the job if any core driver failed
          for core in postgres mysql sqlite3 sqlserver; do
            binary="driver-${core}-${{ matrix.suffix }}"
            [ "${{ matrix.goos }}" = "windows" ] && binary="${binary}.exe"
            if [ ! -f "build-out/$binary" ]; then
              echo "FATAL: core driver $core failed to build"
              exit 1
            fi
          done

      - name: Upload driver binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sidecar/build-out
          for binary in driver-*; do
            echo "Uploading $binary..."
            gh release upload ${{ github.event.release.tag_name }} \
              --repo ${{ github.repository }} \
              "$binary" || echo "Warning: failed to upload $binary"
          done

  upload-checksums:
    needs: [build-sidecar, build-drivers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload drivers.json manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            sidecar/drivers.json

      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --pattern 'omnibase-sidecar-*' \
            --pattern 'driver-*' \
            --dir assets

      - name: Generate and upload checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd assets

          # Core sidecar checksums
          sha256sum omnibase-sidecar-* 2>/dev/null | sort -k2 > checksums-sha256.txt
          echo "Core sidecar checksums:"
          cat checksums-sha256.txt

          # Driver plugin checksums
          sha256sum driver-* 2>/dev/null | sort -k2 > driver-checksums-sha256.txt
          echo ""
          echo "Driver plugin checksums ($(wc -l < driver-checksums-sha256.txt) entries):"
          head -10 driver-checksums-sha256.txt
          [ $(wc -l < driver-checksums-sha256.txt) -gt 10 ] && echo "..."

          gh release upload ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            checksums-sha256.txt \
            driver-checksums-sha256.txt

  publish-npm:
    needs: upload-checksums
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build

      - name: Publish to npm
        run: node scripts/publish.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
