name: Build & Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            cc: aarch64-linux-gnu-gcc
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            cc: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            cc: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            cc: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum

      - name: Install cross-compiler
        if: matrix.cc == 'aarch64-linux-gnu-gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build sidecar
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          cd sidecar
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -o omnibase-sidecar-${{ matrix.suffix }}.exe .
          else
            go build -o omnibase-sidecar-${{ matrix.suffix }} .
          fi

      - name: Create archive
        shell: bash
        run: |
          cd sidecar
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a omnibase-sidecar-${{ matrix.suffix }}.zip omnibase-sidecar-${{ matrix.suffix }}.exe
          else
            tar -czf omnibase-sidecar-${{ matrix.suffix }}.tar.gz omnibase-sidecar-${{ matrix.suffix }}
          fi

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd sidecar
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload ${{ github.event.release.tag_name }} \
              omnibase-sidecar-${{ matrix.suffix }}.exe \
              omnibase-sidecar-${{ matrix.suffix }}.zip
          else
            gh release upload ${{ github.event.release.tag_name }} \
              omnibase-sidecar-${{ matrix.suffix }} \
              omnibase-sidecar-${{ matrix.suffix }}.tar.gz
          fi

  upload-checksums:
    needs: build-sidecar
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --pattern 'omnibase-sidecar-*' \
            --dir assets

      - name: Generate and upload checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd assets
          sha256sum omnibase-sidecar-* | sort -k2 > checksums-sha256.txt
          echo "Generated checksums:"
          cat checksums-sha256.txt
          gh release upload ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            checksums-sha256.txt

  publish-npm:
    needs: upload-checksums
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build

      - name: Publish to npm
        run: node scripts/publish.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
