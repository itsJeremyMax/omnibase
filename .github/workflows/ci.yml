name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum
      - run: pnpm install --frozen-lockfile
      - run: cd sidecar && go build -o omnibase-sidecar .
      - run: pnpm test

  test-go:
    name: Go Sidecar Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum
      - run: cd sidecar && go test ./... -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-typescript, test-go]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: omnibase
          POSTGRES_PASSWORD: omnibase
          POSTGRES_DB: testdb
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U omnibase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: omnibase
          MYSQL_DATABASE: testdb
          MYSQL_USER: omnibase
          MYSQL_PASSWORD: omnibase
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u omnibase -pomnibase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sidecar/go.sum
      - run: pnpm install --frozen-lockfile
      - run: cd sidecar && go build -o omnibase-sidecar .
      - run: pnpm run test:integration
