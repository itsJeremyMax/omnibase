name: CI

on:
  push:
    branches: [main, release-please--*]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run format:check
      - run: pnpm run lint

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build sidecar and driver plugins for tests
        run: |
          cd sidecar
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/omnibase-sidecar . && chmod +x bin/omnibase-sidecar
          go build -ldflags="-s -w" -o bin/driver-sqlite3-linux-amd64 ./drivers/sqlite3/
      - run: pnpm test

  test-go:
    name: Go Sidecar Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum
      - run: cd sidecar && go test ./driverplugin/... ./driverclient/... ./drivermanager/... -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-typescript, test-go]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: omnibase
          POSTGRES_PASSWORD: omnibase
          POSTGRES_DB: testdb
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U omnibase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: omnibase
          MYSQL_DATABASE: testdb
          MYSQL_USER: omnibase
          MYSQL_PASSWORD: omnibase
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u omnibase -pomnibase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: sidecar/go.sum
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build sidecar and driver plugins for integration tests
        run: |
          cd sidecar
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/omnibase-sidecar . && chmod +x bin/omnibase-sidecar
          for driver in sqlite3 postgres mysql; do
            go build -ldflags="-s -w" -o bin/driver-${driver}-linux-amd64 ./drivers/${driver}/
          done
      - run: pnpm run test:integration
        env:
          OMNIBASE_DRIVERS_PATH: sidecar/bin
